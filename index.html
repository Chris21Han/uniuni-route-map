<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIUNI Hub Network</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

#map {
    width: 100%;
    height: 100%;
}

.title {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 22px;
    font-weight: bold;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
}

.region-label{
    background:none;
    border:none;
}

.region-label-text{
    background:white;
    border:1px solid #999;
    border-radius:4px;
    padding:3px 8px;
    font-size:12px;
    font-weight:bold;
    color:#222;
    white-space:nowrap;
}

.region-tooltip{
    background:white;
    border:1px solid #999;
    border-radius:4px;
    padding:3px 8px;
    font-size:12px;
    font-weight:bold;
    color:#222;
    box-shadow:none;
}

.region-tooltip:before{
    display:none;
}

.legend {
    background: white;
    padding: 6px;
    border-radius: 6px;
    line-height: 1.3;
}

#filter-panel{
    position:absolute;
    top:65px;
    left:20px;
    z-index:1000;

    width:220px;
    max-height:65vh;
    overflow-y:auto;

    background:#ffffff;
    padding:10px;
    border-radius:10px;

    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

#regionCards{

    position:absolute;

    inset:0;

    pointer-events:none;

    z-index:1000;

}

.region-card{

    position:absolute;

    width:160px;

    background:#fafafa;

    border:2px solid #ff8c00;

    border-radius:6px;

    padding:6px;

    box-shadow:0 3px 10px rgba(0,0,0,.12);

    pointer-events:auto;
}

.region-card-title{

    font-weight:bold;

    font-size:12px;

    margin-bottom:6px;

    color:#ff8c00;
}

#filter-panel label{
    display:block;
    font-size:11px;
    font-weight:bold;
    margin-bottom:4px;
}

#filter-panel select{
    width:180px;
    margin-bottom:10px;
    padding:5px;
}

.choices{
    margin-bottom:10px;
}

.choices__inner{
    min-height:22px;
    font-size:11px;
}

.choices__list--dropdown{
    z-index:99999;
    max-height:400px;
    overflow-y:auto;
    font-size:10px;}

#routeCount,
#hubCount{

    font-size:12px;

    line-height:1.2;

    color:#333;

    font-weight:500;

}
</style>
</head>

<body>

<div class="title">UNIUNI Hub Network</div>

<div id="filter-panel">

    <label>Origin Region</label>
    <select id="originRegionFilter" multiple></select>

    <label>Origin Hub</label>
    <select id="originHubFilter" multiple></select>

    <label>Destination Region</label>
    <select id="destinationRegionFilter" multiple></select>

    <label>Destination Hub</label>
    <select id="destinationHubFilter" multiple></select>

    <label>View Mode</label>

    <select id="viewMode">

        <option value="hub">
            Hub Level
        </option>

        <option value="region">
            Region Level
        </option>

    </select>

    <hr>

    <div id="routeCount">
    0 Routes
    </div>

    <div id="hubCount">
    0 Hubs
    </div>

</div>

<div id="regionCards"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

let hubMarkers = [];
let hubs = [];
let routes = [];
let regionRoutes = [];

let hubCoords = {};
let hubRegionMap = {};
let hubDisplayMap = {};
let regionCoords = {};

async function loadExcel(){

    const response = await fetch(
        "./hub_route.xlsx"
    );

    const arrayBuffer =
        await response.arrayBuffer();

    const workbook =
        XLSX.read(arrayBuffer,{
            type:"array"
        });

    const hubSheet =
        workbook.Sheets["Hub_Master"];

    const routeSheet =
        workbook.Sheets["Route_Master"];

    const regionRouteSheet =
        workbook.Sheets["Region_Route"];

    const hubData =
        XLSX.utils.sheet_to_json(hubSheet);

    const routeData =
        XLSX.utils.sheet_to_json(routeSheet);

    const regionRouteData =
        XLSX.utils.sheet_to_json(regionRouteSheet);

    console.log("Hub Data:",hubData);
    console.log("Route Data:",routeData);

    hubs = hubData;
    routes = routeData;
    regionRoutes = regionRouteData;

    hubs.forEach(hub=>{

        hubCoords[hub.Hub] = [
            Number(hub.Lat),
            Number(hub.Lng)
        ];

        hubRegionMap[hub.Hub] =
            hub.Region;

        hubDisplayMap[hub.Hub] =
            hub.Hub;

    });

    const regionPoints = {};

    hubs.forEach(hub=>{

        if(!regionPoints[hub.Region]){

            regionPoints[hub.Region] = [];

        }

        regionPoints[hub.Region].push([
            Number(hub.Lat),
            Number(hub.Lng)
        ]);

    });

    Object.keys(regionPoints).forEach(region=>{

        const points =
            regionPoints[region];

        const avgLat =
            points.reduce(
                (sum,p)=>sum+p[0],
                0
            )
            /
            points.length;

        const avgLng =
            points.reduce(
                (sum,p)=>sum+p[1],
                0
            )
            /
            points.length;

        regionCoords[region] = [
            avgLat,
            avgLng
        ];

    });

    hubs.forEach(hub=>{

        const color =
            Number(hub["Hub Level"]) === 1
            ? "#e53935"
            : "#1976d2";

        const marker = L.circleMarker(
            [
                Number(hub.Lat),
                Number(hub.Lng)
            ],
            {
                radius:5,
                color:color,
                fillColor:color,
                fillOpacity:1,
                weight:2
            }
        )
        .addTo(map)
        .bindPopup(`
            <b>${hub.Hub}</b><br>
            Region: ${hub.Region}<br>
            Level: ${hub["Hub Level"]}<br>
            Daily Capacity: ${hub["Daily Capacity"]}<br>
            Address:<br>
            ${hub.Address}
        `);

        hubMarkers.push(marker);

    });

    const regions =
    [
        ...new Set(
            hubs.map(h => h.Region)
        )
    ];

    originRegionChoices.clearStore();
    destinationRegionChoices.clearStore();
    originHubChoices.clearStore();
    destinationHubChoices.clearStore();

    originRegionChoices.setChoices(
        regions.map(r=>({
            value:r,
            label:r
        })),
        "value",
        "label",
        true
    );

    destinationRegionChoices.setChoices(
        regions.map(r=>({
            value:r,
            label:r
        })),
        "value",
        "label",
        true
    );

    originHubChoices.setChoices(
        hubs.map(h=>({
            value:h.Hub,
            label:h.Hub
        })),
        "value",
        "label",
        true
    );

    destinationHubChoices.setChoices(
        hubs.map(h=>({
            value:h.Hub,
            label:h.Hub
        })),
        "value",
        "label",
        true
    );

    const viewMode =
        document.getElementById(
            "viewMode"
        ).value;

    if(viewMode === "region"){

        hubMarkers.forEach(
            marker => map.removeLayer(marker)
        );

    }else{

        hubMarkers.forEach(
            marker => map.addLayer(marker)
        );

    }
    drawRoutes();

}

const map = L.map('map').setView([35.5, -100], 4);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution: '© OpenStreetMap'
}
).addTo(map);




const originRegionFilter =
document.getElementById("originRegionFilter");

const originHubFilter =
document.getElementById("originHubFilter");

const destinationRegionFilter =
document.getElementById("destinationRegionFilter");

const destinationHubFilter =
document.getElementById("destinationHubFilter");

const originRegionChoices =
new Choices(originRegionFilter,{
    removeItemButton:true,
    searchEnabled:true,
    shouldSort:false
});

const originHubChoices =
new Choices(originHubFilter,{
    removeItemButton:true,
    searchEnabled:true,
    shouldSort:false
});

const destinationRegionChoices =
new Choices(destinationRegionFilter,{
    removeItemButton:true,
    searchEnabled:true,
    shouldSort:false
});

const destinationHubChoices =
new Choices(destinationHubFilter,{
    removeItemButton:true,
    searchEnabled:true,
    shouldSort:false
});

const regionLabels = {
    SEA:[48.00,-120.00],
    BAY:[38.85,-122.55],
    LAX:[35.85,-117.75],
    DEN:[41.15,-107.7],
    DFW:[33.25,-99.60],
    ORD:[40.25,-88.70],
    ATL:[32.10,-84.70],
    MIA:[26.25,-80.10],
    JFK:[39.05,-74.35]
};
const regionLabelShown = {};


Object.entries(regionLabels).forEach(([region, coords]) => {

    L.circleMarker(coords,{
        radius:6,
        color:"#444",
        fillColor:"#444",
        fillOpacity:1,
        weight:2,
        opacity:0.3
    })
    .addTo(map)
    .bindTooltip(region,{
        permanent:true,
        direction:'center',
        className:'region-tooltip'
    })

});

const routeLayers = [];

function drawRoutes(){

    console.log("drawRoutes running");

    routeLayers.forEach(
        layer => map.removeLayer(layer)
    );

    routeLayers.length = 0;

    const originRegions =
        originRegionChoices.getValue(true);

    const destinationRegions =
        destinationRegionChoices.getValue(true);

    const originHubs =
        originHubChoices.getValue(true);

    const destinationHubs =
        destinationHubChoices.getValue(true);

    console.log("originHubs:", originHubs);
    console.log("destinationHubs:", destinationHubs);

    const visibleHubs = new Set();
        const viewMode =
        document.getElementById(
            "viewMode"
        ).value;

    
        if(viewMode==="region"){
            const bidirectionalSet = new Set();

            const routeSet = new Set();
            
            regionRoutes.forEach(route=>{

                const from =
                    route["Origin Region"];

                const to =
                    route["Destination Region"];

                const reverseKey =
                    `${to}_${from}`;

                const currentKey =
                    `${from}_${to}`;

                if(
                    regionRoutes.some(r=>
                        r["Origin Region"]===to
                        &&
                        r["Destination Region"]===from
                    )
                ){
                    bidirectionalSet.add(currentKey);
                    bidirectionalSet.add(reverseKey);
                }

            });
            regionRoutes.forEach(route=>{

                const fromRegion =
                    route["Origin Region"];

                const toRegion =
                    route["Destination Region"];

                const passFilter =

                    (
                        originRegions.length===0
                        ||
                        originRegions.includes(fromRegion)
                    )

                    &&

                    (
                        destinationRegions.length===0
                        ||
                        destinationRegions.includes(toRegion)
                    );

                if(!passFilter){
                    return;
                }

                const routeKey =
                    `${fromRegion}_${toRegion}`;

                if(routeSet.has(routeKey)){
                    return;
                }

                routeSet.add(routeKey);

                const from =
                    regionLabels[fromRegion];

                const to =
                    regionLabels[toRegion];

                if(!from || !to){
                    return;
                }

                const isBidirectional =
                    bidirectionalSet.has(routeKey);

                const line = L.polyline(
                    [from,to],
                    {
                        color:
                            isBidirectional
                            ? "#1976d2"
                            : "#e53935",

                        weight:
                            isBidirectional
                            ? 3
                            : 3,

                        opacity:0.8
                    }
                )
                .bindTooltip(

                    isBidirectional

                    ? `${fromRegion} ↔ ${toRegion}`

                    : `${fromRegion} → ${toRegion}`

                )
                .addTo(map);

                routeLayers.push(line);

                if(!isBidirectional){

                    const arrow = L.polylineDecorator(
                        line,
                        {
                            patterns:[
                                {
                                    offset:'50%',
                                    repeat:0,
                                    symbol:L.Symbol.arrowHead({
                                        pixelSize:12,
                                        polygon:true,
                                        pathOptions:{
                                            color:'#e53935',
                                            fillOpacity:1,
                                            weight:2
                                        }
                                    })
                                }
                            ]
                        }
                    ).addTo(map);

                    routeLayers.push(arrow);

                }
                }); 

            document.getElementById(
                "routeCount"
            ).innerHTML =
                `${routeLayers.length} Routes`;

            document.getElementById(
                "hubCount"
            ).innerHTML =
                `${Object.keys(regionLabels).length} Regions`;

            updateLegend();
            return;
        }

    console.log(
        "viewMode:",
        viewMode
    );

    routes.forEach(route => {
        console.log(
            "Checking:",
            route["Origin Hub"],
            route["Destination Hub"]
        );

        const fromHub = route["Origin Hub"];
        const toHub = route["Destination Hub"];

        const fromRegion =
            route["Origin Region"];

        const toRegion =
            route["Destination Region"];

        const passFilter =

            (
                originRegions.length === 0
                ||
                originRegions.includes(fromRegion)
            )

            &&

            (
                originHubs.length === 0
                ||
                originHubs.includes(fromHub)
            )

            &&

            (
                destinationRegions.length === 0
                ||
                destinationRegions.includes(toRegion)
            )

            &&

            (
                destinationHubs.length === 0
                ||
                destinationHubs.includes(toHub)
            );

        if(!passFilter){
            return;
        }

            let from;
            let to;

            from = hubCoords[fromHub];
            to = hubCoords[toHub];

            if(!from || !to){

                console.log(
                    "Missing Hub:",
                    fromHub,
                    toHub
                );

                return;
            }
            
            console.log(
                "fromHub:",
                fromHub,
                from
            );

            console.log(
                "toHub:",
                toHub,
                to
            );
            const line = L.polyline(
                [from,to],
                {
                    color:"#9aa0a6",
                    weight:2,
                    opacity:0.5
                }
            )
            .bindTooltip(

                viewMode==="region"

                ? `${fromRegion} → ${toRegion}`

                : `${hubDisplayMap[fromHub]} → ${hubDisplayMap[toHub]}`

            )
            .addTo(map);

            routeLayers.push(line);

            visibleHubs.add(fromHub);
            visibleHubs.add(toHub);


    });

    document.getElementById(
        "routeCount"
    ).innerHTML =
        `${routeLayers.length} Routes`;

    document.getElementById(
        "hubCount"
    ).innerHTML =
        `${visibleHubs.size} Hubs`;

    updateLegend();

}


originRegionFilter.addEventListener(
    "addItem",
    drawRoutes
);

originRegionFilter.addEventListener(
    "removeItem",
    drawRoutes
);

originHubFilter.addEventListener(
    "addItem",
    drawRoutes
);

originHubFilter.addEventListener(
    "removeItem",
    drawRoutes
);

destinationRegionFilter.addEventListener(
    "addItem",
    drawRoutes
);

destinationRegionFilter.addEventListener(
    "removeItem",
    drawRoutes
);

destinationHubFilter.addEventListener(
    "addItem",
    drawRoutes
);

destinationHubFilter.addEventListener(
    "removeItem",
    drawRoutes
);

document
.getElementById("viewMode")
.addEventListener(
    "change",
    function(){

        const mode =
            document.getElementById(
                "viewMode"
            ).value;

        if(mode==="region"){

            hubMarkers.forEach(
                marker =>
                map.removeLayer(marker)
            );
            renderRegionCards();

        }else{

            hubMarkers.forEach(
                marker =>
                marker.addTo(map)
            );
            document.getElementById(
                "regionCards"
            ).innerHTML = "";

        }

        drawRoutes();

    }
);

const legend = L.control({position:'bottomright'});

legend.onAdd = function(){

    const div =
        L.DomUtil.create('div','legend');

    div.id = "legendBox";

    return div;

};

legend.addTo(map);

const cardPositions = {

    SEA:{
        top:"430px",
        left:"260px"
    },

    BAY:{
        bottom:"20px",
        left:"260px"
    },

    LAX:{
        bottom:"20px",
        left:"450px"
    },

    ORD:{
        top:"40px",
        right:"20px"
    },

    JFK:{
        top:"170px",
        right:"20px"
    },

    ATL:{
        top:"450px",
        right:"20px"
    },

    DEN:{
        bottom:"20px",
        left:"640px"
    },

    DFW:{
        bottom:"20px",
        left:"830px"
    },

    MIA:{
        bottom:"20px",
        left:"1020px"
    }

};

function renderRegionCards(){

    const container =
        document.getElementById(
            "regionCards"
        );

    container.innerHTML = "";

    const regionGroups = {};

    hubs.forEach(hub=>{

        if(!regionGroups[hub.Region]){

            regionGroups[hub.Region] = [];

        }

        regionGroups[hub.Region].push(hub);

    });

    Object.entries(regionGroups)
    .forEach(([region, regionHubs])=>{

        const card =
            document.createElement("div");

        card.className =
            "region-card";

        const pos =
            cardPositions[region];

        if(pos){

            Object.assign(
                card.style,
                pos
            );

}

        let hubHtml = "";

        regionHubs.forEach(hub=>{

            hubHtml += `

            <div style="
                margin-bottom:8px;
                padding-bottom:8px;
                border-bottom:1px solid #eee;
                font-size:12px;
            ">

                <div style="
                    font-weight:bold;
                    font-size:11px;
                    color:#222;
                    margin-bottom:2px;
                ">
                    ${hub.Hub}
                    <span style="
                        color:#ff7a00;
                        margin-left:3px;
                        font-size:10px;
                    ">
                        L${hub["Hub Level"]}
                    </span>
                </div>

                <div>
                    Daily:
                    ${Number(
                        hub["Daily Capacity"]
                    ).toLocaleString()}
                </div>

                <div>
                    Max:
                    ${Number(
                        hub["Current Maximum Capacity"]
                    ).toLocaleString()}
                </div>

                <div style="
                    margin-top:3px;
                    font-size:10px;
                    color:#666;
                    line-height:1.2;
                ">
                    ${hub["Sorting Mode"]}
                </div>

            </div>

            `;

        });

        card.innerHTML = `

            <div class="region-card-title">
                ${region}
            </div>

            ${hubHtml}

        `;

        container.appendChild(card);

    });

}

function updateLegend(){

    const mode =
        document.getElementById(
            "viewMode"
        ).value;

    const legendBox =
        document.getElementById(
            "legendBox"
        );

    if(!legendBox) return;

    if(mode === "region"){

        legendBox.innerHTML = `
            <b>Route Type</b><br>

            <span style="color:#e53935;font-size:20px;">━</span>
            Single Direction
            <br>

            <span style="color:#1976d2;font-size:20px;">━</span>
            Bidirectional
        `;

    }else{

        legendBox.innerHTML = `
            <b>Legend</b><br>

            🔴 Level 1 Hub<br>
            🔵 Level 2 Hub<br>
            <br>
            Node Size: Fixed
        `;

    }

}

loadExcel();
console.log("hubs loaded:", hubs.length);
console.log("routes loaded:", routes.length);

drawRoutes();
updateLegend();

</script>

</body>
</html>
